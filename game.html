<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI-Sim - Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0f;
    color: #f5f7fa;
    height: 100vh; overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout — full width, no sidebar */
  .game-layout {
    display: grid;
    grid-template-rows: auto 1fr 44px;
    height: 100vh;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 52px;
    border-bottom: 1px solid rgba(245,247,250,0.06);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 16px; font-weight: 700; color: #f5f7fa; letter-spacing: -0.3px; }
  .logo span { color: #6EC9FF; }
  .header-title { font-size: 14px; font-weight: 600; color: rgba(245,247,250,0.7); }
  .header-sep { width: 1px; height: 20px; background: rgba(245,247,250,0.08); }

  .timer {
    font-size: 18px; font-weight: 700; color: #f5f7fa;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .timer.urgent { color: #f87171; }

  .score-area { display: flex; align-items: center; gap: 10px; }
  .score-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 700;
  }
  .score-chip.you {
    background: rgba(110,201,255,0.08);
    border: 1px solid rgba(110,201,255,0.15);
    color: #6EC9FF;
  }
  .score-chip.ai {
    background: rgba(245,247,250,0.04);
    border: 1px solid rgba(245,247,250,0.08);
    color: rgba(245,247,250,0.5);
  }
  .score-chip .label { font-weight: 500; opacity: 0.6; }
  .score-vs { font-size: 11px; color: rgba(245,247,250,0.2); font-weight: 700; letter-spacing: 1px; }

  /* Skip task button */
  .skip-task-btn {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); z-index: 20;
    padding: 12px 24px; border-radius: 12px;
    background: rgba(245,247,250,0.06); border: 1px solid rgba(245,247,250,0.1);
    font-size: 14px; font-weight: 600; color: rgba(245,247,250,0.6);
    cursor: pointer; display: none;
    transition: all 0.2s; font-family: inherit;
  }
  .skip-task-btn:hover { background: rgba(245,247,250,0.1); color: #f5f7fa; }
  .skip-task-btn.visible { display: block; animation: fadeIn 0.5s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* Demo panel */
  .demo-panel {
    position: fixed; top: 8px; right: 8px; z-index: 600;
    width: 200px; background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 12px; border: 1px solid rgba(245,247,250,0.06);
  }
  .demo-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .demo-panel-title { font-size: 10px; font-weight: 700; color: #f87171; text-transform: uppercase; letter-spacing: 0.5px; }
  .demo-panel-note { font-size: 10px; color: rgba(245,247,250,0.3); }
  .demo-btn {
    display: block; width: 100%; padding: 7px 10px; border-radius: 8px;
    background: rgba(245,247,250,0.04); border: 1px solid rgba(245,247,250,0.06);
    font-size: 11px; font-weight: 500; color: rgba(245,247,250,0.5);
    cursor: pointer; margin-bottom: 5px; text-align: left;
    transition: all 0.15s; font-family: inherit;
  }
  .demo-btn:last-child { margin-bottom: 0; }
  .demo-btn:hover { background: rgba(110,201,255,0.06); border-color: rgba(110,201,255,0.15); color: #6EC9FF; }

  /* Main game area */
  .game-main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 0;
  }
  .game-panel {
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .game-panel.player-panel {
    border-left: 1px solid rgba(245,247,250,0.04);
    background: #0c0c12;
  }
  .game-panel.ai-panel {
    background: #0a0a0f;
  }
  .ai-demo-notice {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 10px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(245,247,250,0.06);
    font-size: 11px; font-weight: 500; color: rgba(245,247,250,0.35);
    white-space: nowrap;
  }
  .ai-demo-notice svg { flex-shrink: 0; color: rgba(245,247,250,0.25); }
  .panel-label {
    position: absolute; top: 12px; left: 16px; z-index: 10;
    font-size: 11px; font-weight: 600; color: rgba(245,247,250,0.25);
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  canvas {
    display: block; width: 100%; height: 100%;
  }

  /* Combo popup */
  .combo-popup {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 32px; font-weight: 800;
    color: #6EC9FF;
    text-shadow: 0 0 20px rgba(110,201,255,0.4);
    opacity: 0; pointer-events: none;
  }
  .combo-popup.show {
    animation: comboAnim 0.7s ease-out forwards;
  }
  @keyframes comboAnim {
    0% { transform: translate(-50%,-50%) scale(0.6); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }

  /* Footer */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    border-top: 1px solid rgba(245,247,250,0.06);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }
  .controls-info { display: flex; gap: 16px; }
  .ctrl-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(245,247,250,0.3);
  }
  .ctrl-key {
    padding: 3px 8px; border-radius: 6px;
    background: rgba(245,247,250,0.04); border: 1px solid rgba(245,247,250,0.08);
    font-size: 10px; font-weight: 700; color: rgba(245,247,250,0.6);
  }
  .combo-info { display: flex; align-items: center; gap: 12px; }
  .combo-badge {
    padding: 5px 12px; border-radius: 8px;
    background: rgba(110,201,255,0.06);
    border: 1px solid rgba(110,201,255,0.12);
    font-size: 13px; font-weight: 700; color: #6EC9FF;
  }
  .placed-info { font-size: 13px; color: rgba(245,247,250,0.5); font-weight: 600; }

  /* Result overlay */
  .result-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(6,6,10,0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
  }
  .result-overlay.active { display: flex; }
  .result-title {
    font-size: 36px; font-weight: 800;
    letter-spacing: -1px; margin-bottom: 6px;
    background: linear-gradient(135deg, #f5f7fa 0%, #a78bfa 50%, #6EC9FF 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-sub {
    font-size: 15px; color: rgba(245,247,250,0.4); margin-bottom: 36px;
  }
  .result-scores {
    display: flex; align-items: center; justify-content: center; gap: 40px;
    margin-bottom: 28px;
  }
  .result-score-block { text-align: center; }
  .result-score-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .result-score-label.you-label { color: #6EC9FF; }
  .result-score-label.ai-label { color: rgba(245,247,250,0.35); }
  .result-score-num { font-size: 40px; font-weight: 800; }
  .result-score-num.you-num { color: #f5f7fa; }
  .result-score-num.ai-num { color: rgba(245,247,250,0.3); }
  .result-vs { font-size: 14px; font-weight: 700; color: rgba(245,247,250,0.15); }

  .result-table {
    width: 100%; max-width: 480px;
    border-radius: 16px; overflow: hidden;
    background: rgba(245,247,250,0.03);
    border: 1px solid rgba(245,247,250,0.06);
    margin-bottom: 24px;
  }
  .rt-row {
    display: grid; grid-template-columns: 1fr auto 1fr;
    padding: 14px 28px;
    border-bottom: 1px solid rgba(245,247,250,0.04);
    align-items: center;
  }
  .rt-row:last-child { border-bottom: none; }
  .rt-dim { font-size: 13px; color: rgba(245,247,250,0.25); font-weight: 500; text-align: center; }
  .rt-val {
    font-size: 18px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .rt-val.you-val { text-align: right; padding-right: 20px; color: #6EC9FF; }
  .rt-val.ai-val { text-align: left; padding-left: 20px; color: rgba(245,247,250,0.3); }
  .rt-val.win { opacity: 1; }
  .rt-val.lose { opacity: 0.3; }
  .result-summary-line {
    font-size: 14px; font-weight: 600; color: #6EC9FF;
    padding: 10px 20px; border-radius: 12px;
    background: rgba(110,201,255,0.06);
    border: 1px solid rgba(110,201,255,0.1);
    margin-bottom: 12px;
  }
  .result-hook-line {
    font-size: 14px; color: rgba(245,247,250,0.4);
    margin-bottom: 28px;
    text-align: center;
  }
  .result-btns { display: flex; gap: 12px; }
  .rbtn {
    padding: 14px 32px; border-radius: 14px;
    font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.2s;
    text-decoration: none; font-family: inherit;
  }
  .rbtn.primary {
    background: linear-gradient(135deg, #6EC9FF, #a78bfa);
    color: #0a0a0f;
    box-shadow: 0 4px 20px rgba(110,201,255,0.25);
  }
  .rbtn.primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(110,201,255,0.35);
  }
  .rbtn.ghost {
    background: rgba(245,247,250,0.05); color: rgba(245,247,250,0.6);
    border: 1px solid rgba(245,247,250,0.08);
  }
  .rbtn.ghost:hover { background: rgba(245,247,250,0.08); color: #f5f7fa; }
</style>
</head>
<body>

<!-- Demo Panel -->
<div class="demo-panel" id="demoPanel">
  <div class="demo-panel-header">
    <span class="demo-panel-title">Demo</span>
    <span class="demo-panel-note">仅限演示</span>
  </div>
  <button class="demo-btn" onclick="simulateAllDone()">模拟：全部完成</button>
  <button class="demo-btn" onclick="simulateTimeout()">模拟：时间到</button>
</div>

<div class="game-layout">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">Joy<span>AI</span></div>
      <div class="header-sep"></div>
      <div class="header-title" id="headerTitle">书桌整理挑战</div>
    </div>
    <div class="timer" id="countdownTimer">--:--</div>
    <div class="score-area">
      <div class="score-chip you"><span class="label">You</span> <span id="yourScore">0</span></div>
      <div class="score-vs">VS</div>
      <div class="score-chip ai"><span class="label">AI</span> <span id="aiScore">0</span></div>
    </div>
  </div>

  <!-- Game panels -->
  <div class="game-main">
    <div class="game-panel ai-panel">
      <div class="panel-label">AI Opponent</div>
      <div class="ai-demo-notice">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>Demo · 正式版展示仿真机器人操作画面</span>
      </div>
      <canvas id="aiCanvas"></canvas>
    </div>
    <div class="game-panel player-panel">
      <div class="panel-label">Your Control</div>
      <canvas id="playerCanvas"></canvas>
      <div class="combo-popup" id="comboPopup"></div>
      <button class="skip-task-btn" id="skipTaskBtn" onclick="triggerEndGame()">看看结果？</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="controls-info">
      <div class="ctrl-item"><span class="ctrl-key">Mouse</span> 移动夹爪</div>
      <div class="ctrl-item"><span class="ctrl-key">Click</span> 下降抓取</div>
      <div class="ctrl-item"><span class="ctrl-key">Space</span> 释放物体</div>
    </div>
    <div class="combo-info">
      <div class="combo-badge" id="comboBadge">x0</div>
      <div class="placed-info"><span id="placedCount">0</span>/5 已归位</div>
    </div>
  </div>
</div>

<!-- Result Overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-title" id="resultTitle">挑战完成！</div>
  <div class="result-sub" id="resultSub"></div>

  <div class="result-scores">
    <div class="result-score-block">
      <div class="result-score-label you-label">You</div>
      <div class="result-score-num you-num" id="rYouScore">-</div>
    </div>
    <div class="result-vs">VS</div>
    <div class="result-score-block">
      <div class="result-score-label ai-label">AI</div>
      <div class="result-score-num ai-num" id="rAiScore">-</div>
    </div>
  </div>

  <div class="result-table">
    <div class="rt-row">
      <div class="rt-val you-val" id="rYouPlaced">-</div>
      <div class="rt-dim">完成数</div>
      <div class="rt-val ai-val" id="rAiPlaced">-</div>
    </div>
    <div class="rt-row">
      <div class="rt-val you-val" id="rYouTime">-</div>
      <div class="rt-dim">用时</div>
      <div class="rt-val ai-val" id="rAiTime">-</div>
    </div>
    <div class="rt-row">
      <div class="rt-val you-val" id="rYouCombo">-</div>
      <div class="rt-dim">最佳连击</div>
      <div class="rt-val ai-val" id="rAiCombo">-</div>
    </div>
  </div>
  <div class="result-summary-line" id="resultSummary"></div>
  <div class="result-hook-line" id="resultHook"></div>
  <div class="result-btns">
    <button class="rbtn primary" onclick="location.reload()">再来一局</button>
    <a class="rbtn ghost" href="leaderboard.html">排行榜</a>
    <a class="rbtn ghost" href="landing.html">返回首页</a>
  </div>
</div>

<script>
// ==================== LEVEL CONFIG FROM URL ====================
const urlParams = new URLSearchParams(window.location.search);
const LEVEL_CONFIG = {
  level: urlParams.get('level') || 'desk-1',
  name: decodeURIComponent(urlParams.get('name') || '书桌·初级'),
  objects: parseInt(urlParams.get('objects')) || 5,
  time: parseInt(urlParams.get('time')) || 720,
  shuffle: urlParams.get('shuffle') === '1',
  obstacles: urlParams.get('obstacles') === '1',
};

document.getElementById('headerTitle').textContent = LEVEL_CONFIG.name;

// ==================== GAME ENGINE ====================
let TOTAL_TIME = LEVEL_CONFIG.time || 720;
if (LEVEL_CONFIG.level === 'tutorial') TOTAL_TIME = 480;
let TOTAL_OBJECTS;
if (LEVEL_CONFIG.level === 'tutorial') {
  TOTAL_OBJECTS = 3;
} else if (LEVEL_CONFIG.objects <= 5) {
  TOTAL_OBJECTS = 3 + Math.floor(Math.random() * 3);
} else {
  TOTAL_OBJECTS = 8 + Math.floor(Math.random() * 5);
}

const BASE_COLORS = ['#60a5fa','#f87171','#fbbf24','#34d399','#a78bfa','#f472b6','#fb923c','#34d399','#818cf8','#fca5a5','#a3e635','#67e8f9'];
const BASE_LABELS = ['Cup','Book','Pen','Box','Ball','Bottle','Phone','Clip','Key','Tape','Eraser','Card'];
const BASE_SHAPES = ['rect','rect','rect','rect','circle','rect','rect','rect','rect','rect','rect','rect'];
const BASE_SIZES = [[24,30],[34,22],[8,36],[26,26],[14,14],[16,32],[32,18],[6,24],[12,20],[22,12],[18,14],[28,16]];
const BASE_POINTS = [10,15,30,20,40,25,10,35,45,20,30,15];

const OBJ_SIZES = BASE_SIZES.slice(0, TOTAL_OBJECTS);
const SHAPES = BASE_SHAPES.slice(0, TOTAL_OBJECTS);
const POINTS = BASE_POINTS.slice(0, TOTAL_OBJECTS);

if (LEVEL_CONFIG.shuffle) {
  for (let i = POINTS.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [POINTS[i], POINTS[j]] = [POINTS[j], POINTS[i]];
  }
}

const COLORS = {
  bg: '#0c0c12', desk: '#2a2535', deskEdge: '#1e1a28',
  claw: '#a0aec0', clawArm: '#718096', cable: '#4a5568',
  target: 'rgba(110,201,255,0.06)', targetBorder: 'rgba(110,201,255,0.3)',
  success: '#34d399',
  objects: BASE_COLORS.slice(0, TOTAL_OBJECTS),
  objectLabels: BASE_LABELS.slice(0, TOTAL_OBJECTS),
};

class ClawGame {
  constructor(canvas, isAI = false) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.isAI = isAI;
    this.resize();

    this.clawX = this.w / 2;
    this.clawY = 40;
    this.clawTargetX = this.w / 2;
    this.clawState = 'idle';
    this.clawOpen = true;
    this.grabbedObj = null;
    this.objects = [];
    this.targets = [];
    this.placed = 0;
    this.score = 0;
    this.combo = 0;
    this.maxCombo = 0;
    this.moves = 0;

    this.initObjects();
    this.initTargets();
    this.obstacles = [];
    if (LEVEL_CONFIG.obstacles) this.initObstacles();

    this.tutorialPhase = isAI ? 'done' : 'move_to_obj';
    this.tutorialObjIndex = 0;
    this.tutorialSuccessTimer = 0;
    this.tutorialClawLocked = false;

    this.aiMoveSpeed = 1.0 + Math.random() * 2.0;
    this.aiThinkDelay = Math.floor(40 - this.aiMoveSpeed * 8);
    this.aiCurrentTarget = null;

    if (!isAI) {
      this.canvas.addEventListener('mousemove', e => this.onMouseMove(e));
      this.canvas.addEventListener('click', e => this.onClick(e));
      window.addEventListener('keydown', e => { if (e.code === 'Space') this.onSpace(); });
    }
  }

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    this.w = rect.width;
    this.h = rect.height;
    this.canvas.width = this.w * devicePixelRatio;
    this.canvas.height = this.h * devicePixelRatio;
    this.ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  initObjects() {
    const deskY = this.h * 0.65;
    const spacing = this.w / (TOTAL_OBJECTS + 1);
    for (let i = 0; i < TOTAL_OBJECTS; i++) {
      const [sw, sh] = OBJ_SIZES[i];
      this.objects.push({
        x: spacing * (i + 1) + (Math.random() - 0.5) * 30,
        y: deskY - sh / 2,
        w: sw, h: sh,
        color: COLORS.objects[i],
        shape: SHAPES[i],
        label: COLORS.objectLabels[i],
        points: POINTS[i],
        placed: false,
        id: i
      });
    }
  }

  initTargets() {
    const targetY = this.h * 0.88;
    const spacing = this.w / (TOTAL_OBJECTS + 1);
    const order = Array.from({length: TOTAL_OBJECTS}, (_, i) => i).sort(() => Math.random() - 0.5);
    for (let i = 0; i < TOTAL_OBJECTS; i++) {
      const [sw, sh] = OBJ_SIZES[order[i]];
      this.targets.push({
        x: spacing * (i + 1),
        y: targetY,
        w: sw + 16, h: sh + 16,
        forId: order[i],
        filled: false
      });
    }
  }

  initObstacles() {
    const deskY = this.h * 0.65;
    const positions = [
      { x: this.w * 0.3, y: deskY + (this.h * 0.88 - deskY) * 0.45 },
      { x: this.w * 0.7, y: deskY + (this.h * 0.88 - deskY) * 0.5 },
    ];
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      const pos = positions[i];
      this.obstacles.push({ x: pos.x, y: pos.y, w: 36, h: 18 });
    }
  }

  onMouseMove(e) {
    if (this.tutorialClawLocked) return;
    if (this.clawState === 'idle' || this.clawState === 'carrying') {
      const rect = this.canvas.getBoundingClientRect();
      this.clawTargetX = e.clientX - rect.left;
    }
  }

  onClick(e) {
    playerStarted = true;
    if (this.tutorialPhase === 'locked_grab') {
      this.clawState = 'descending';
      this.moves++;
      this.tutorialPhase = 'move_to_target';
      return;
    }
    if (this.tutorialPhase === 'move_to_obj' || this.tutorialPhase === 'locked_drop') return;
    if (this.clawState === 'idle') {
      this.clawState = 'descending';
      this.moves++;
    }
  }

  onSpace() {
    if (this.clawState === 'carrying' && this.grabbedObj) {
      this.clawState = 'dropping';
    }
  }

  updateTutorial() {
    if (this.tutorialPhase === 'done') return;
    const tutObj = this.objects[this.tutorialObjIndex];
    if (!tutObj || tutObj.placed) {
      this.tutorialObjIndex++;
      if (this.tutorialObjIndex >= 2) { this.tutorialPhase = 'done'; return; }
      this.tutorialPhase = 'move_to_obj';
      return;
    }

    if (this.tutorialPhase === 'move_to_obj') {
      if (Math.abs(this.clawX - tutObj.x) < tutObj.w * 0.8 && this.clawState === 'idle') {
        this.tutorialPhase = 'locked_grab';
        this.tutorialClawLocked = true;
        this.clawTargetX = tutObj.x;
      }
    } else if (this.tutorialPhase === 'move_to_target') {
      this.tutorialClawLocked = false;
      if (this.clawState === 'carrying') {
        const t = this.targets.find(t => t.forId === tutObj.id && !t.filled);
        if (t && Math.abs(this.clawX - t.x) < t.w) {
          this.tutorialPhase = 'locked_drop';
          this.tutorialClawLocked = true;
          this.clawTargetX = t.x;
        }
      }
      if (this.clawState === 'idle' && !this.grabbedObj) {
        this.tutorialPhase = 'move_to_obj';
      }
    } else if (this.tutorialPhase === 'success') {
      this.tutorialSuccessTimer++;
      if (this.tutorialSuccessTimer > 120) {
        this.tutorialObjIndex++;
        this.tutorialSuccessTimer = 0;
        if (this.tutorialObjIndex >= 2) {
          this.tutorialPhase = 'done';
        } else {
          this.tutorialPhase = 'move_to_obj';
          this.tutorialClawLocked = false;
        }
      }
    }
  }

  drawTutorial() {
    if (this.isAI || this.tutorialPhase === 'done') return;
    const ctx = this.ctx;
    const tutObj = this.objects[this.tutorialObjIndex];
    if (!tutObj) return;

    if (this.tutorialPhase === 'move_to_obj' || this.tutorialPhase === 'locked_grab') {
      ctx.save();
      const grad = ctx.createRadialGradient(tutObj.x, tutObj.y, 5, tutObj.x, tutObj.y, 55);
      grad.addColorStop(0, 'rgba(110, 201, 255, 0.2)');
      grad.addColorStop(0.5, 'rgba(110, 201, 255, 0.08)');
      grad.addColorStop(1, 'rgba(110, 201, 255, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(tutObj.x, tutObj.y, 55, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(110, 201, 255, 0.3)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(tutObj.x, tutObj.y, 35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    const tooltipY = this.clawY + 50;
    let text = '';
    if (this.tutorialPhase === 'move_to_obj') {
      text = '移动鼠标，将夹爪移到 ' + tutObj.label + ' 上方';
    } else if (this.tutorialPhase === 'locked_grab') {
      text = '就是现在！点击鼠标抓取';
    } else if (this.tutorialPhase === 'move_to_target') {
      text = '移到虚线框内';
    } else if (this.tutorialPhase === 'locked_drop') {
      text = '按空格释放物体';
    } else if (this.tutorialPhase === 'success') {
      const remaining = TOTAL_OBJECTS - this.placed;
      text = '漂亮！还有 ' + remaining + ' 个物品等着你';
    }

    if (text) {
      ctx.save();
      ctx.font = '13px Inter, system-ui, sans-serif';
      const tw = ctx.measureText(text).width;
      const px = Math.max(10, Math.min(this.clawX - tw / 2 - 12, this.w - tw - 34));
      const py = Math.min(tooltipY, this.h - 40);
      ctx.fillStyle = 'rgba(110,201,255,0.15)';
      ctx.beginPath();
      ctx.roundRect(px, py, tw + 24, 32, 8);
      ctx.fill();
      ctx.fillStyle = '#f5f7fa';
      ctx.textAlign = 'left';
      ctx.fillText(text, px + 12, py + 21);
      ctx.restore();
    }
  }

  aiThink() {
    if (this.clawState !== 'idle' && this.clawState !== 'carrying') return;
    const unplaced = this.objects.filter(o => !o.placed);
    if (unplaced.length === 0) return;

    if (this.clawState === 'idle') {
      if (!this.aiCurrentTarget || this.aiCurrentTarget.placed) {
        this.aiCurrentTarget = unplaced[Math.floor(Math.random() * unplaced.length)];
      }
      const wobble = (Math.random() - 0.5) * 10;
      this.clawTargetX = this.aiCurrentTarget.x + wobble;
      if (Math.abs(this.clawX - this.aiCurrentTarget.x) < 8) {
        this.clawState = 'descending';
        this.moves++;
        this.aiCurrentTarget = null;
      }
    } else if (this.clawState === 'carrying' && this.grabbedObj) {
      const t = this.targets.find(t => t.forId === this.grabbedObj.id && !t.filled);
      if (t) {
        this.clawTargetX = t.x;
        if (Math.abs(this.clawX - t.x) < 5) {
          this.clawState = 'dropping';
        }
      }
    }
  }

  update() {
    const speed = this.isAI ? this.aiMoveSpeed : 5;
    this.clawX += (this.clawTargetX - this.clawX) * 0.08 * speed;

    const deskY = this.h * 0.65;
    const restY = 40;
    const descendSpeed = this.isAI ? (1.5 + this.aiMoveSpeed * 0.3) : 4;
    const ascendSpeed = this.isAI ? (1.2 + this.aiMoveSpeed * 0.3) : 3;

    switch (this.clawState) {
      case 'idle':
        this.clawY += (restY - this.clawY) * 0.1;
        this.clawOpen = true;
        break;
      case 'descending':
        this.clawY += descendSpeed;
        this.clawOpen = true;
        if (this.clawY >= deskY - 15) {
          this.clawState = 'grabbing';
          this.clawOpen = false;
          for (const obj of this.objects) {
            if (!obj.placed && Math.abs(obj.x - this.clawX) < obj.w * 0.7) {
              if (this.isAI && Math.random() < 0.15) break;
              this.grabbedObj = obj;
              break;
            }
          }
          setTimeout(() => { this.clawState = 'ascending'; }, this.isAI ? 300 + Math.random() * 200 : 200);
        }
        break;
      case 'grabbing': break;
      case 'ascending':
        this.clawY -= ascendSpeed;
        if (this.grabbedObj) {
          this.grabbedObj.x = this.clawX;
          this.grabbedObj.y = this.clawY + 20;
        }
        if (this.clawY <= restY) {
          this.clawState = this.grabbedObj ? 'carrying' : 'idle';
        }
        break;
      case 'carrying':
        this.clawY = restY;
        if (this.grabbedObj) {
          this.grabbedObj.x = this.clawX;
          this.grabbedObj.y = this.clawY + 20;
          if (this.isAI && Math.random() < 0.002) {
            const obj = this.grabbedObj;
            this.grabbedObj = null;
            obj.y = deskY - obj.h / 2;
            this.clawOpen = true;
            this.clawState = 'idle';
            this.combo = 0;
          }
        }
        break;
      case 'dropping':
        this.clawOpen = true;
        if (this.grabbedObj) {
          const obj = this.grabbedObj;
          this.grabbedObj = null;
          const matchTarget = this.targets.find(t => t.forId === obj.id && !t.filled && Math.abs(t.x - obj.x) < t.w);
          const fumble = this.isAI && Math.random() < 0.20;
          if (matchTarget && !fumble) {
            obj.placed = true;
            obj.x = matchTarget.x;
            obj.y = matchTarget.y;
            matchTarget.filled = true;
            this.placed++;
            this.combo++;
            if (this.combo > this.maxCombo) this.maxCombo = this.combo;
            this.score += obj.points * (1 + (this.combo - 1) * 0.5);
            if (!this.isAI) this.showCombo();
            if (!this.isAI && this.tutorialPhase !== 'done' && this.placed <= 2) {
              this.tutorialPhase = 'success';
              this.tutorialSuccessTimer = 0;
              this.tutorialClawLocked = false;
            }
          } else {
            obj.y = deskY - obj.h / 2;
            this.combo = 0;
          }
        }
        this.clawState = 'idle';
        break;
    }
  }

  showCombo() {
    const el = document.getElementById('comboPopup');
    el.textContent = `x${this.combo}`;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.w, this.h);

    const deskY = this.h * 0.65;

    // Desk surface
    ctx.fillStyle = COLORS.desk;
    ctx.beginPath();
    ctx.roundRect(40, deskY, this.w - 80, 14, 6);
    ctx.fill();
    ctx.fillStyle = COLORS.deskEdge;
    ctx.fillRect(60, deskY + 14, 8, 40);
    ctx.fillRect(this.w - 68, deskY + 14, 8, 40);

    // Target zones
    for (const t of this.targets) {
      ctx.strokeStyle = t.filled ? COLORS.success : COLORS.targetBorder;
      ctx.fillStyle = t.filled ? 'rgba(52,211,153,0.06)' : COLORS.target;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(t.filled ? [] : [4, 4]);
      ctx.beginPath();
      ctx.roundRect(t.x - t.w/2, t.y - t.h/2, t.w, t.h, 8);
      ctx.fill();
      ctx.stroke();
      ctx.setLineDash([]);

      if (!t.filled) {
        const obj = this.objects[t.forId];
        ctx.fillStyle = 'rgba(110,201,255,0.4)';
        ctx.font = '10px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(obj.label, t.x, t.y + t.h/2 + 14);
      }
    }

    // Obstacles
    for (const obs of this.obstacles) {
      ctx.save();
      ctx.fillStyle = 'rgba(248,113,113,0.1)';
      ctx.strokeStyle = 'rgba(248,113,113,0.3)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.roundRect(obs.x - obs.w/2, obs.y - obs.h/2, obs.w, obs.h, 5);
      ctx.fill();
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(248,113,113,0.5)';
      ctx.font = '8px Inter, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('obstacle', obs.x, obs.y + 3);
      ctx.restore();
    }

    // Objects
    for (const obj of this.objects) {
      if (obj === this.grabbedObj && this.clawState === 'grabbing') continue;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      if (obj.shape === 'circle') {
        ctx.arc(obj.x, obj.y, obj.w, 0, Math.PI * 2);
      } else {
        ctx.roundRect(obj.x - obj.w/2, obj.y - obj.h/2, obj.w, obj.h, 4);
      }
      ctx.fill();

      if (!obj.placed) {
        ctx.fillStyle = 'rgba(245,247,250,0.8)';
        ctx.font = 'bold 13px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(obj.points + 'pt', obj.x, obj.y - obj.h/2 - 8);
      }
    }

    // Cable
    ctx.strokeStyle = COLORS.cable;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.clawX, 0);
    ctx.lineTo(this.clawX, this.clawY);
    ctx.stroke();

    // Claw arm
    ctx.fillStyle = COLORS.clawArm;
    ctx.beginPath();
    ctx.roundRect(this.clawX - 18, this.clawY - 6, 36, 12, 4);
    ctx.fill();

    // Claw fingers
    const openAngle = this.clawOpen ? 0.3 : 0.05;
    ctx.strokeStyle = COLORS.claw;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(this.clawX - 8, this.clawY + 6);
    ctx.lineTo(this.clawX - 8 - Math.sin(openAngle) * 16, this.clawY + 6 + Math.cos(openAngle) * 16);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(this.clawX + 8, this.clawY + 6);
    ctx.lineTo(this.clawX + 8 + Math.sin(openAngle) * 16, this.clawY + 6 + Math.cos(openAngle) * 16);
    ctx.stroke();

    // Grabbed object
    if (this.grabbedObj && (this.clawState === 'ascending' || this.clawState === 'carrying')) {
      const obj = this.grabbedObj;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      if (obj.shape === 'circle') {
        ctx.arc(obj.x, obj.y, obj.w, 0, Math.PI * 2);
      } else {
        ctx.roundRect(obj.x - obj.w/2, obj.y - obj.h/2, obj.w, obj.h, 4);
      }
      ctx.fill();
    }

    // Rail
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(0, 0, this.w, 4);

    this.drawTutorial();
  }
}

// ==================== INIT ====================
let playerGame, aiGame, gameOver, aiCooldown;
let elapsedSeconds = 0;
let remainingTime = TOTAL_TIME;
let playerStarted = false;

function init() {
  const playerCanvas = document.getElementById('playerCanvas');
  const aiCanvas = document.getElementById('aiCanvas');
  const rect = playerCanvas.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) { requestAnimationFrame(init); return; }

  playerGame = new ClawGame(playerCanvas, false);
  aiGame = new ClawGame(aiCanvas, true);
  gameOver = false;
  aiCooldown = 60;

  const noteHtml = buildLevelNote();
  if (noteHtml) {
    const noteEl = document.createElement('div');
    noteEl.id = 'levelNote';
    noteEl.innerHTML = noteHtml;
    document.body.appendChild(noteEl);
  }

  gameLoop();

  const timerEl = document.getElementById('countdownTimer');
  const initMins = Math.floor(TOTAL_TIME / 60);
  const initSecs = TOTAL_TIME % 60;
  timerEl.textContent = `${initMins}:${initSecs.toString().padStart(2,'0')}`;

  setInterval(() => {
    if (gameOver || !playerStarted) return;
    elapsedSeconds++;
    remainingTime = TOTAL_TIME - elapsedSeconds;
    const m = Math.floor(remainingTime / 60);
    const s = remainingTime % 60;
    timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (remainingTime <= 60) timerEl.classList.add('urgent');
    if (remainingTime <= 0) {
      timerEl.textContent = '0:00';
      document.getElementById('skipTaskBtn').classList.add('visible');
    }
  }, 1000);
}

requestAnimationFrame(init);

function aiTick() {
  if (gameOver || !playerStarted) return;
  aiCooldown--;
  if (aiCooldown <= 0) {
    aiGame.aiThink();
    aiCooldown = aiGame.aiThinkDelay + Math.floor(Math.random() * 20);
  }
}

function gameLoop() {
  if (!gameOver) {
    playerGame.update();
    playerGame.updateTutorial();
    if (playerStarted) {
      aiGame.update();
      aiTick();
    }
  }

  playerGame.draw();
  aiGame.draw();

  document.getElementById('yourScore').textContent = Math.round(playerGame.score);
  document.getElementById('aiScore').textContent = Math.round(aiGame.score);
  document.getElementById('comboBadge').textContent = `x${playerGame.combo}`;
  document.getElementById('placedCount').textContent = playerGame.placed;

  if (!gameOver && (playerGame.placed >= TOTAL_OBJECTS || aiGame.placed >= TOTAL_OBJECTS)) {
    triggerEndGame();
  }

  requestAnimationFrame(gameLoop);
}

function triggerEndGame() {
  if (gameOver) return;
  gameOver = true;

  const robotTime = 45 + Math.floor(Math.random() * 30);

  document.getElementById('rYouPlaced').textContent = playerGame.placed + '/' + TOTAL_OBJECTS;
  document.getElementById('rAiPlaced').textContent = aiGame.placed + '/' + TOTAL_OBJECTS;
  document.getElementById('rYouTime').textContent = formatTime(elapsedSeconds);
  document.getElementById('rAiTime').textContent = formatTime(robotTime);
  document.getElementById('rYouCombo').textContent = 'x' + playerGame.maxCombo;
  document.getElementById('rAiCombo').textContent = 'x' + aiGame.maxCombo;
  document.getElementById('rYouScore').textContent = Math.round(playerGame.score);
  document.getElementById('rAiScore').textContent = Math.round(aiGame.score);

  const rows = document.querySelectorAll('.rt-row');
  const youVals = [playerGame.placed, -elapsedSeconds, playerGame.maxCombo, playerGame.score];
  const aiVals = [aiGame.placed, -robotTime, aiGame.maxCombo, aiGame.score];
  let youWins = 0;
  rows.forEach((row, i) => {
    const yv = row.querySelector('.you-val');
    const av = row.querySelector('.ai-val');
    if (youVals[i] >= aiVals[i]) { yv.classList.add('win'); av.classList.add('lose'); youWins++; }
    else { av.classList.add('win'); yv.classList.add('lose'); }
  });

  document.getElementById('resultSummary').textContent = `你在 ${youWins}/3 项中超越了 AI`;
  document.getElementById('resultSub').textContent = `用时 ${formatTime(elapsedSeconds)}，完成 ${playerGame.placed}/${TOTAL_OBJECTS} 个物体归位`;

  const pScore = Math.round(playerGame.score);
  const aScore = Math.round(aiGame.score);
  const gap = (pScore - aScore) / Math.max(aScore, 1);
  let hook, title;
  if (gap > 0.2) {
    title = '你赢了！';
    hook = `你比机器人高了 ${pScore - aScore} 分 — 物体多了之后还能赢吗？`;
  } else if (gap > -0.2) {
    title = '不相上下！';
    hook = '和机器人不相上下 — 进阶赛中一决高下？';
  } else {
    title = 'AI 这次赢了';
    hook = '机器人这次赢了 — 再试一次还是直接挑战进阶？';
  }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultHook').textContent = hook;

  setTimeout(() => { document.getElementById('resultOverlay').classList.add('active'); }, 600);
}

function simulateAllDone() {
  if (gameOver) return;
  const scenario = Math.floor(Math.random() * 3);
  playerGame.placed = TOTAL_OBJECTS;
  aiGame.placed = TOTAL_OBJECTS;
  if (scenario === 0) {
    elapsedSeconds = 90; playerGame.score = 220; playerGame.maxCombo = 5; aiGame.score = 160; aiGame.maxCombo = 3;
  } else if (scenario === 1) {
    elapsedSeconds = 140; playerGame.score = 175; playerGame.maxCombo = 3; aiGame.score = 170; aiGame.maxCombo = 3;
  } else {
    elapsedSeconds = 250; playerGame.score = 130; playerGame.maxCombo = 2; aiGame.score = 190; aiGame.maxCombo = 4;
  }
  triggerEndGame();
}
function simulateTimeout() {
  elapsedSeconds = TOTAL_TIME;
  remainingTime = 0;
  const timerEl = document.getElementById('countdownTimer');
  timerEl.textContent = '0:00';
  timerEl.classList.add('urgent');
  document.getElementById('skipTaskBtn').classList.add('visible');
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function buildLevelNote() {
  const features = [];
  const dataGoals = [];
  if (LEVEL_CONFIG.level === 'tutorial') return '';
  features.push('每局物体位置随机');
  dataGoals.push('同物体不同位置的抓取轨迹');
  if (LEVEL_CONFIG.shuffle) {
    features.push('每局物体分值不同');
    dataGoals.push('不同抓取顺序（策略分化）');
  }
  if (LEVEL_CONFIG.obstacles) {
    features.push('场景含随机障碍物');
    dataGoals.push('障碍物规避路径数据');
  }
  features.push('重复游玩，每次操作自然有差异');
  dataGoals.push('同物体不同抓取轨迹');
  return `
    <div style="position:fixed;bottom:16px;left:16px;z-index:800;width:260px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:12px 14px;font-size:11px;color:rgba(251,191,36,0.8);line-height:1.6;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:10px;font-weight:700;color:#FBBF24;text-transform:uppercase;letter-spacing:0.5px;">关卡设计说明</span>
        <button onclick="document.getElementById('levelNote').remove()" style="width:18px;height:18px;border-radius:4px;border:none;background:rgba(251,191,36,0.1);color:#FBBF24;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>
      </div>
      <div style="margin-bottom:6px;"><strong>本关特色：</strong><br>${features.join('<br>')}</div>
      <div><strong>数据收集目标：</strong><br>${dataGoals.join('<br>')}</div>
    </div>`;
}

window.addEventListener('resize', () => {
  if (playerGame && aiGame) { playerGame.resize(); aiGame.resize(); }
});
</script>
