<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI-Sim - 3D Arm Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Inter', sans-serif; }
  canvas { display: block; }
  .mode-label {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    padding: 8px 18px; border-radius: 10px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 500;
  }
  .back-btn {
    position: fixed; top: 24px; left: 24px;
    padding: 8px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 500;
    text-decoration: none; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
  .coord-display {
    position: fixed; bottom: 24px; left: 24px;
    padding: 14px 18px; border-radius: 12px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    font-family: monospace; font-size: 12px; color: rgba(255,255,255,0.7);
    line-height: 1.8;
  }
  .loading-msg {
    position: fixed; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.4); font-size: 15px; font-weight: 500;
  }
  .loading-msg.hidden { display: none; }
</style>
</head>
<body>

<div class="loading-msg" id="loadingMsg">Loading 3D Scene...</div>
<div class="mode-label" id="modeLabel">自动演示中</div>
<button id="modeBtn" style="position:fixed; bottom:24px; right:24px; padding:10px 20px; border-radius:10px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:#fff; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; z-index:20;">切换调试面板</button>
<div id="debugPanel" style="display:none; position:fixed; top:60px; right:24px; width:260px; max-height:80vh; overflow-y:auto; padding:16px; border-radius:14px; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1); z-index:20; font-size:11px; color:rgba(255,255,255,0.7);">
  <div style="margin-bottom:12px; font-weight:700; color:#fff;">骨骼调试 — 拖动找正确旋转轴</div>
  <div id="sliders"></div>
</div>
<a class="back-btn" href="landing.html">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  返回首页
</a>
<div class="coord-display" id="coordDisplay">Loading...</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// THREE.JS SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 4, 6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 8, 4);
dirLight.castShadow = true;
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0x8899ff, 0.3).translateX(-3).translateY(2));

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// XYZ Axes
scene.add(new THREE.AxesHelper(2).translateX(-3).translateZ(-3));

// ============================================================
// LOAD RIGGED GLB — bones are already set up!
// ============================================================
let bones = {}; // bone name -> THREE.Bone
let skeleton = null;

async function loadModel() {
  const gltf = await new GLTFLoader().loadAsync('assets/桌子有骨架.glb');
  const model = gltf.scene;

  // Auto-scale & center
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);
  const scale = 4 / Math.max(size.x, size.y, size.z);
  model.scale.set(scale, scale, scale);
  model.position.set(-center.x * scale, -center.y * scale + 1, -center.z * scale);

  // Find the skeleton from the first SkinnedMesh
  model.traverse(child => {
    if (child.isSkinnedMesh && child.skeleton && !skeleton) {
      skeleton = child.skeleton;
      console.log('Found skeleton with', skeleton.bones.length, 'bones');
      skeleton.bones.forEach(b => {
        bones[b.name] = b;
        console.log('  Bone:', b.name);
      });
    }
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  scene.add(model);
  document.getElementById('loadingMsg').classList.add('hidden');
  console.log('Bones found:', Object.keys(bones).length, Object.keys(bones).join(', '));
}

// ============================================================
// MODE & DEBUG PANEL
// ============================================================
let mode = 'auto';
const debugBones = ['L_Disc','L_Joint1','L_Joint2','L_Joint3','L_Arm3','L_GripBase','L_GripL','L_GripR',
                     'R_Disc','R_Joint1','R_Joint2','R_Joint3','R_Joint4','R_Arm4','R_GripBase','R_GripL','R_GripR'];

document.getElementById('modeBtn').addEventListener('click', () => {
  mode = mode === 'auto' ? 'debug' : 'auto';
  document.getElementById('modeLabel').textContent = mode === 'auto' ? '自动演示中' : '调试模式';
  document.getElementById('modeBtn').textContent = mode === 'auto' ? '切换调试面板' : '切换自动演示';
  document.getElementById('debugPanel').style.display = mode === 'debug' ? 'block' : 'none';
  // Reset all bones
  Object.values(bones).forEach(b => b.rotation.set(0, 0, 0));
  if (mode === 'debug') buildSliders();
});

function buildSliders() {
  const container = document.getElementById('sliders');
  container.innerHTML = '';
  debugBones.forEach(name => {
    if (!bones[name]) return;
    ['x', 'y', 'z'].forEach(axis => {
      const row = document.createElement('div');
      row.style.cssText = 'margin-bottom:6px;';
      const label = document.createElement('span');
      label.style.cssText = 'display:inline-block; width:90px; font-size:11px;';
      label.textContent = `${name}.${axis}`;
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = '-1.5';
      slider.max = '1.5';
      slider.step = '0.01';
      slider.value = '0';
      slider.style.cssText = 'width:100px; vertical-align:middle; accent-color:#6EC9FF;';
      const val = document.createElement('span');
      val.style.cssText = 'font-size:11px; margin-left:6px; font-family:monospace;';
      val.textContent = '0.00';
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        bones[name].rotation[axis] = v;
        val.textContent = v.toFixed(2);
      });
      row.appendChild(label);
      row.appendChild(slider);
      row.appendChild(val);
      container.appendChild(row);
    });
    // Divider between bones
    const div = document.createElement('div');
    div.style.cssText = 'height:1px; background:rgba(255,255,255,0.06); margin:8px 0;';
    container.appendChild(div);
  });
}

// ============================================================
// ANIMATION
// ============================================================
function smoothstep(t) { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }

let animTime = 0;

function animate(dt) {
  if (mode === 'auto') {
    animTime += dt;
    const t = (animTime % 10) / 10;

  // ---- LEFT ARM ----
  // Disc: Y rotation
  if (bones.L_Disc) bones.L_Disc.rotation.y = Math.sin(t * Math.PI * 2) * 0.5;

  // Joints: X rotation (bend)
  if (t < 0.3) {
    const p = smoothstep(t / 0.3);
    if (bones.L_Joint1) bones.L_Joint1.rotation.x = -0.3 * p;
    if (bones.L_Joint2) bones.L_Joint2.rotation.x = -0.4 * p;
    if (bones.L_Joint3) bones.L_Joint3.rotation.x = -0.2 * p;
  } else if (t < 0.45) {
    if (bones.L_Joint1) bones.L_Joint1.rotation.x = -0.3;
    if (bones.L_Joint2) bones.L_Joint2.rotation.x = -0.4;
    if (bones.L_Joint3) bones.L_Joint3.rotation.x = -0.2;
  } else if (t < 0.65) {
    const p = smoothstep((t - 0.45) / 0.2);
    if (bones.L_Joint1) bones.L_Joint1.rotation.x = -0.3 + 0.6 * p;
    if (bones.L_Joint2) bones.L_Joint2.rotation.x = -0.4 + 0.7 * p;
    if (bones.L_Joint3) bones.L_Joint3.rotation.x = -0.2 + 0.4 * p;
  } else if (t < 0.8) {
    if (bones.L_Joint1) bones.L_Joint1.rotation.x = 0.3;
    if (bones.L_Joint2) bones.L_Joint2.rotation.x = 0.3;
    if (bones.L_Joint3) bones.L_Joint3.rotation.x = 0.2;
  } else {
    const p = smoothstep((t - 0.8) / 0.2);
    if (bones.L_Joint1) bones.L_Joint1.rotation.x = 0.3 * (1 - p);
    if (bones.L_Joint2) bones.L_Joint2.rotation.x = 0.3 * (1 - p);
    if (bones.L_Joint3) bones.L_Joint3.rotation.x = 0.2 * (1 - p);
  }

  // ---- RIGHT ARM ---- (offset timing)
  const rt = ((animTime + 5) % 10) / 10;

  if (bones.R_Disc) bones.R_Disc.rotation.y = Math.sin(rt * Math.PI * 2) * 0.6;

  if (rt < 0.25) {
    const p = smoothstep(rt / 0.25);
    if (bones.R_Joint1) bones.R_Joint1.rotation.x = 0.25 * p;
    if (bones.R_Joint2) bones.R_Joint2.rotation.x = 0.3 * p;
    if (bones.R_Joint3) bones.R_Joint3.rotation.x = 0.2 * p;
  } else if (rt < 0.5) {
    const p = smoothstep((rt - 0.25) / 0.25);
    if (bones.R_Joint1) bones.R_Joint1.rotation.x = 0.25 - 0.55 * p;
    if (bones.R_Joint2) bones.R_Joint2.rotation.x = 0.3 - 0.65 * p;
    if (bones.R_Joint3) bones.R_Joint3.rotation.x = 0.2 - 0.45 * p;
  } else if (rt < 0.7) {
    if (bones.R_Joint1) bones.R_Joint1.rotation.x = -0.3;
    if (bones.R_Joint2) bones.R_Joint2.rotation.x = -0.35;
    if (bones.R_Joint3) bones.R_Joint3.rotation.x = -0.25;
  } else {
    const p = smoothstep((rt - 0.7) / 0.3);
    if (bones.R_Joint1) bones.R_Joint1.rotation.x = -0.3 * (1 - p);
    if (bones.R_Joint2) bones.R_Joint2.rotation.x = -0.35 * (1 - p);
    if (bones.R_Joint3) bones.R_Joint3.rotation.x = -0.25 * (1 - p);
  }

  // Wrist spin
  if (bones.L_Arm3) bones.L_Arm3.rotation.y = animTime * 0.8;
  if (bones.R_Arm4) bones.R_Arm4.rotation.y = animTime * -0.6;
  } // end auto mode

  updateCoordDisplay();
}

// ============================================================
// COORD DISPLAY
// ============================================================
const coordEl = document.getElementById('coordDisplay');
function updateCoordDisplay() {
  const boneNames = ['L_Disc', 'L_Joint1', 'L_Joint2', 'R_Disc', 'R_Joint1'];
  let html = '';
  boneNames.forEach(name => {
    const b = bones[name];
    if (b) {
      const r = b.rotation;
      html += `<span style="color:rgba(255,255,255,0.35)">${name}:</span> X:${r.x.toFixed(2)} Y:${r.y.toFixed(2)}<br>`;
    }
  });
  coordEl.innerHTML = html || 'No bones found';
}

// ============================================================
// RENDER LOOP
// ============================================================
const clock = new THREE.Clock();
function loop() {
  requestAnimationFrame(loop);
  controls.update();
  animate(clock.getDelta());
  renderer.render(scene, camera);
}

// ============================================================
// START
// ============================================================
try { await loadModel(); } catch(e) {
  document.getElementById('loadingMsg').textContent = 'Error: ' + e.message;
  console.error(e);
}
loop();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
