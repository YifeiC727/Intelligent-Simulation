<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI-Sim - Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #FAFBFD;
    color: #1E293B;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 1100;
    width: 56px; background: #FFFFFF;
    border-right: 1px solid #E2E8F0;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 4px;
  }
  .sb-item {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: #94A3B8; cursor: pointer;
    transition: all 0.15s; text-decoration: none; position: relative;
  }
  .sb-item:hover { background: #F1F5F9; color: #475569; }
  .sb-item.active { background: #EFF6FF; color: #2563EB; }
  .sb-item .sb-tooltip {
    display: none; position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
    padding: 5px 10px; border-radius: 6px; background: #1E293B; color: #fff;
    font-size: 11px; font-weight: 500; white-space: nowrap;
    box-shadow: 0 4px 12px rgba(15,23,42,0.12);
  }
  .sb-item:hover .sb-tooltip { display: block; }
  .sb-divider { width: 28px; height: 1px; background: #E2E8F0; margin: 8px 0; }

  /* ── Loading screen ── */
  .loading-screen {
    position: fixed; top: 0; left: 56px; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #FAFBFD;
  }

  /* ── Content container ── */
  .loading-content {
    position: relative;
    text-align: center;
    max-width: 560px;
    padding: 24px;
  }

  /* ── Phase transition ── */
  .loading-phase {
    display: none; flex-direction: column; align-items: center; gap: 32px;
    animation: phaseIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .loading-phase.active { display: flex; }
  @keyframes phaseIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .loading-phase h2 {
    font-size: 32px; font-weight: 700; color: #0F172A;
    letter-spacing: -0.5px; line-height: 1.3;
  }
  .loading-phase p {
    font-size: 17px; color: #64748B; line-height: 1.6;
    font-weight: 400;
  }

  /* ── Scene preview card ── */
  .scene-preview {
    width: 420px; height: 240px;
    border-radius: 24px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    position: relative; overflow: hidden;
    box-shadow: 0 12px 40px rgba(15,23,42,0.06);
  }
  .scene-preview .preview-label {
    font-size: 12px; color: #94A3B8; font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ── Scene illustration ── */
  .scene-illust {
    position: relative; width: 200px; height: 90px;
  }
  .illust-desk {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 170px; height: 6px; background: #E2E8F0;
    border-radius: 3px;
  }
  .illust-obj {
    position: absolute; bottom: 6px; border-radius: 4px;
  }
  .illust-obj-1 { left: 28px; width: 18px; height: 22px; background: #93C5FD; border-radius: 4px; }
  .illust-obj-2 { left: 73px; width: 26px; height: 16px; background: #FCD34D; border-radius: 4px; }
  .illust-obj-3 { left: 122px; width: 12px; height: 24px; background: #86EFAC; border-radius: 4px; }
  .illust-arm {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 3px; height: 42px;
    background: linear-gradient(to bottom, #CBD5E1, #E2E8F0);
    border-radius: 2px;
    animation: armFloat 3.5s ease-in-out infinite;
  }
  .illust-arm::after {
    content: ''; position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 8px;
    background: #CBD5E1;
    border-radius: 2px 2px 5px 5px;
  }
  @keyframes armFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(5px); }
  }

  /* ── Control hints ── */
  .control-hints {
    display: flex; gap: 20px; justify-content: center;
  }
  .hint-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: #475569; font-weight: 500;
  }
  .hint-key {
    padding: 7px 14px; border-radius: 10px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 0 rgba(15,23,42,0.04);
    font-size: 12px; font-weight: 700; color: #334155;
    font-family: 'Inter', -apple-system, sans-serif;
    letter-spacing: 0.02em;
  }

  /* ── Hook section (Phase 3) ── */
  .hook-stat {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 16px;
    background: #FFF7ED;
    border: 1px solid #FED7AA;
  }
  .hook-stat-icon {
    width: 20px; height: 20px; color: #F59E0B;
  }
  .hook-stat-text {
    font-size: 15px; font-weight: 600; color: #92400E;
  }

  /* ── Phase dots ── */
  .phase-dots {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 12px;
  }
  .phase-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #D1D5DB;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .phase-dot.active {
    background: #2563EB;
    width: 24px; border-radius: 3px;
  }

  /* ── Progress bar ── */
  .loading-progress {
    width: 200px; height: 3px;
    background: #E2E8F0;
    border-radius: 2px; overflow: hidden;
    margin: 24px auto 0;
  }
  .loading-progress-bar {
    height: 100%; width: 0%;
    background: #2563EB;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── Skip button ── */
  .skip-btn {
    position: absolute; bottom: 32px; right: 36px; z-index: 10;
    padding: 10px 20px; border-radius: 12px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    box-shadow: 0 1px 3px rgba(15,23,42,0.04);
    font-size: 13px; font-weight: 600;
    color: #64748B; text-decoration: none;
    transition: all 0.2s;
    font-family: 'Inter', -apple-system, sans-serif;
  }
  .skip-btn:hover {
    background: #F8FAFC;
    border-color: #CBD5E1;
    color: #334155;
    box-shadow: 0 2px 8px rgba(15,23,42,0.08);
  }
  .skip-note { font-size: 11px; color: #94A3B8; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .control-hints { flex-direction: column; gap: 12px; align-items: center; }
    .scene-preview { width: 320px; height: 190px; }
    .loading-phase h2 { font-size: 26px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <a class="sb-item" href="landing.html" title="返回首页"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg><span class="sb-tooltip">返回首页</span></a>
  <div class="sb-divider"></div>
  <a class="sb-item" href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><span class="sb-tooltip">视觉理解</span></a>
  <a class="sb-item" href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span class="sb-tooltip">视觉生成</span></a>
  <a class="sb-item active" href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span class="sb-tooltip">具身交互</span></a>
  <a class="sb-item" href="#"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg><span class="sb-tooltip">数据看板</span></a>
</div>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <!-- Phase 1: Scene Preview -->
    <div class="loading-phase active" id="phase1">
      <div class="scene-preview">
        <div class="scene-illust">
          <div class="illust-arm"></div>
          <div class="illust-desk"></div>
          <div class="illust-obj illust-obj-1"></div>
          <div class="illust-obj illust-obj-2"></div>
          <div class="illust-obj illust-obj-3"></div>
        </div>
        <div class="preview-label">Demo 占位 · 实际使用仿真场景预览</div>
      </div>
      <h2>即将进入<br>书桌整理挑战</h2>
      <p>桌面上 3 个物体等你归位</p>
    </div>

    <!-- Phase 2: Controls -->
    <div class="loading-phase" id="phase2">
      <h2>操控方式</h2>
      <div class="control-hints">
        <div class="hint-item"><span class="hint-key">Mouse</span> 移动</div>
        <div class="hint-item"><span class="hint-key">Click</span> 抓取</div>
        <div class="hint-item"><span class="hint-key">Space</span> 释放</div>
      </div>
      <p>像抓娃娃一样简单</p>
    </div>

    <!-- Phase 3: Hook -->
    <div class="loading-phase" id="phase3">
      <h2>你能比机器人<br>做得更好吗？</h2>
      <div class="hook-stat">
        <svg class="hook-stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="hook-stat-text">机器人完成同样任务用了 45 秒</span>
      </div>
    </div>

    <div class="phase-dots">
      <div class="phase-dot active" id="dot0"></div>
      <div class="phase-dot" id="dot1"></div>
      <div class="phase-dot" id="dot2"></div>
    </div>

    <div class="loading-progress">
      <div class="loading-progress-bar" id="progressBar"></div>
    </div>
  </div>

  <a href="game.html" class="skip-btn">跳过加载 <span class="skip-note">(仅限 Demo)</span></a>
</div>

<script>
  const phases = [
    document.getElementById('phase1'),
    document.getElementById('phase2'),
    document.getElementById('phase3')
  ];
  const dots = [
    document.getElementById('dot0'),
    document.getElementById('dot1'),
    document.getElementById('dot2')
  ];
  const progressBar = document.getElementById('progressBar');

  let currentPhase = 0;
  const phaseDuration = 20000;
  const totalDuration = phaseDuration * 3;
  let startTime = Date.now();

  function updateProgress() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min((elapsed / totalDuration) * 100, 100);
    progressBar.style.width = progress + '%';

    const newPhase = Math.min(Math.floor(elapsed / phaseDuration), 2);
    if (newPhase !== currentPhase) {
      phases[currentPhase].classList.remove('active');
      dots[currentPhase].classList.remove('active');
      phases[newPhase].classList.add('active');
      dots[newPhase].classList.add('active');
      currentPhase = newPhase;
    }

    if (elapsed < totalDuration) {
      requestAnimationFrame(updateProgress);
    } else {
      setTimeout(() => { window.location.href = 'game.html'; }, 400);
    }
  }
  requestAnimationFrame(updateProgress);
</script>

</body>
</html>
