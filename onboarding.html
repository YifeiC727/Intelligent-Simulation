<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI-Sim - Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #particles { position: fixed; inset: 0; z-index: 0; }

  /* Top bar */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
  }
  .logo { height: 32px; margin-left: -8px; }
  .logo img { height: 100%; width: auto; display: block; }
  .skip-btn {
    padding: 8px 18px; border-radius: 10px;
    background: rgba(245,247,250,0.06); border: 1px solid rgba(245,247,250,0.1);
    font-size: 13px; font-weight: 500; color: rgba(245,247,250,0.5);
    text-decoration: none; cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .skip-btn:hover { background: rgba(245,247,250,0.1); color: rgba(245,247,250,0.8); }

  /* Loading content */
  .loading-wrap {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* Phase transition */
  .phase {
    display: none; flex-direction: column; align-items: center; gap: 24px;
    text-align: center; max-width: 560px; padding: 24px;
    animation: phaseIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    justify-content: center;
    min-height: 320px; /* all phases same height — text stays aligned */
  }
  .phase.active { display: flex; }
  @keyframes phaseIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .phase h2 {
    font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1.2;
    background: linear-gradient(135deg, #f5f7fa 0%, #a78bfa 50%, #6EC9FF 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .phase p {
    font-size: 16px; color: rgba(245,247,250,0.4); line-height: 1.7; font-weight: 400;
  }

  /* Briefing tags */
  .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .tag {
    padding: 6px 14px; border-radius: 10px;
    background: rgba(245,247,250,0.04); border: 1px solid rgba(245,247,250,0.08);
    font-size: 13px; font-weight: 500; color: rgba(245,247,250,0.5);
  }
  .tag.hl {
    background: rgba(110,201,255,0.08); border-color: rgba(110,201,255,0.2);
    color: #6EC9FF;
  }

  /* Scene preview */
  .preview-frame {
    width: 280px; height: 130px; border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(110,201,255,0.12);
    box-shadow: 0 0 24px rgba(110,201,255,0.06), 0 12px 36px rgba(0,0,0,0.3);
    position: relative; flex-shrink: 0;
  }
  .preview-frame img {
    width: 200%; height: 100%; object-fit: cover;
    position: absolute; top: 0; left: -50%;
  }

  /* Control hints */
  .controls {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px 32px; max-width: 480px; margin: 0 auto;
  }
  .ctrl {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: rgba(245,247,250,0.55); font-weight: 500;
    padding: 10px 16px; border-radius: 12px;
    background: rgba(245,247,250,0.03);
    border: 1px solid rgba(245,247,250,0.06);
  }
  .ctrl-keys-group {
    display: flex; gap: 4px; align-items: center; flex-shrink: 0;
  }
  .ctrl-label {
    white-space: nowrap;
  }
  .ctrl kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; height: 32px; padding: 0 7px;
    border-radius: 8px;
    background: rgba(20,24,32,0.9);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
    font-size: 12px; font-weight: 700;
    color: #fff;
  }

  /* Hook stat */
  .hook-card {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 24px; border-radius: 14px;
    background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.15);
  }
  .hook-card svg { color: #FBBF24; }
  .hook-card span { font-size: 15px; font-weight: 600; color: #FBBF24; }

  /* Phase dots */
  .dots {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(245,247,250,0.15);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .dot.active {
    background: #6EC9FF; width: 24px; border-radius: 3px;
    box-shadow: 0 0 8px rgba(110,201,255,0.4);
  }

  /* Progress bar */
  .progress {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 3px; border-radius: 2px;
    background: rgba(245,247,250,0.06); z-index: 20;
  }
  .progress-bar {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, #6EC9FF, #a78bfa);
    box-shadow: 0 0 8px rgba(110,201,255,0.3);
    transition: width 0.3s ease;
  }

  /* Demo next button */
  .demo-btn {
    margin-top: 8px; padding: 8px 18px; border-radius: 10px;
    background: rgba(245,247,250,0.05); border: 1px solid rgba(245,247,250,0.1);
    font-size: 13px; font-weight: 500; color: rgba(245,247,250,0.4);
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .demo-btn:hover { background: rgba(245,247,250,0.1); color: rgba(245,247,250,0.7); }

  @media (max-width: 768px) {
    .phase h2 { font-size: 26px; }
    .preview-frame { width: 280px; height: 130px; }
    .controls { grid-template-columns: 1fr; gap: 8px; max-width: 320px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="top-bar">
  <div class="logo"><img src="assets/JoyAI.png" alt="JoyAI"></div>
  <a onclick="window.location.href='game.html'+window.location.search" class="skip-btn" style="cursor:pointer;">跳过</a>
</div>

<div class="loading-wrap">
  <!-- Phase 1: Briefing -->
  <div class="phase active" id="phase1">
    <h2 id="briefingTitle">书桌 · 初级</h2>
    <div class="tags" id="briefingTags"></div>
    <p id="briefingDesc"></p>
  </div>

  <!-- Phase 2: Scene Preview -->
  <div class="phase" id="phase2">
    <h2>即将进入挑战</h2>
    <p id="phase2Desc">桌面上的物体等你归位</p>
    <div class="preview-frame">
      <img src="assets/sim-grab.gif" alt="scene preview" />
    </div>
  </div>

  <!-- Phase 3: Controls -->
  <div class="phase" id="phase3">
    <h2>操控方式</h2>
    <div class="controls">
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>Tab</kbd></div>
        <span class="ctrl-label">切换左/右臂</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>W</kbd><kbd>S</kbd></div>
        <span class="ctrl-label">前进 / 后退</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>A</kbd><kbd>D</kbd></div>
        <span class="ctrl-label">左移 / 右移</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>↑</kbd><kbd>↓</kbd></div>
        <span class="ctrl-label">上升 / 下降</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>←</kbd><kbd>→</kbd></div>
        <span class="ctrl-label">俯仰旋转</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>Space</kbd></div>
        <span class="ctrl-label">夹爪开合</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>Q</kbd><kbd>E</kbd></div>
        <span class="ctrl-label">旋转视角</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>H</kbd></div>
        <span class="ctrl-label">复位</span>
      </div>
      <div class="ctrl">
        <div class="ctrl-keys-group"><kbd>Esc</kbd></div>
        <span class="ctrl-label">暂停</span>
      </div>
    </div>

  </div>

  <!-- Phase 4: Hook -->
  <div class="phase" id="phase4">
    <h2>你能比机器人<br>做得更好吗？</h2>
    <div class="hook-card">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>机器人完成同样任务用了 10 分 14 秒</span>
    </div>
  </div>

  <button onclick="skipToNextPhase()" class="demo-btn">下一步 →</button>
</div>

<div class="dots">
  <div class="dot active" id="dot0"></div>
  <div class="dot" id="dot1"></div>
  <div class="dot" id="dot2"></div>
  <div class="dot" id="dot3"></div>
</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
// Particle background
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PARTICLE_COUNT = 1500;
const particles = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5,
    alpha: Math.random() * 0.3 + 0.05,
    hue: Math.random() < 0.5 ? 210 : 270
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 60%, 70%, ${p.alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// Parse URL params
const urlParams = new URLSearchParams(window.location.search);
const levelName = decodeURIComponent(urlParams.get('name') || '书桌·初级');
const objects = parseInt(urlParams.get('objects')) || 5;
const time = parseInt(urlParams.get('time')) || 720;
const shuffle = urlParams.get('shuffle') === '1';
const obstacles = urlParams.get('obstacles') === '1';
const isT = urlParams.get('level') === 'tutorial';

document.getElementById('briefingTitle').textContent = levelName;

const tags = [];
if (isT) {
  tags.push('<span class="tag hl">教学模式</span>');
  tags.push('<span class="tag">不限时</span>');
  tags.push('<span class="tag">' + objects + ' 个物体</span>');
} else {
  tags.push('<span class="tag">' + Math.floor(time/60) + ' 分钟</span>');
  tags.push('<span class="tag">' + objects + ' 个物体</span>');
  if (shuffle) tags.push('<span class="tag hl">分值随机</span>');
  if (obstacles) tags.push('<span class="tag hl">障碍物</span>');
  tags.push('<span class="tag">位置随机</span>');
}
document.getElementById('briefingTags').innerHTML = tags.join('');

let desc = isT
  ? '跟随引导学习机械臂操控，完成 1 个物体的抓取放置任务。'
  : ['物体位置每局随机', shuffle ? '物体分值每局变化' : '', obstacles ? '含障碍物，需规划路径' : ''].filter(Boolean).join('，') + '。';
document.getElementById('briefingDesc').textContent = desc;
document.getElementById('phase2Desc').textContent = '桌面上 ' + objects + ' 个物体等你归位';

// Phase rotation
const phases = ['phase1','phase2','phase3','phase4'].map(id => document.getElementById(id));
const dots = ['dot0','dot1','dot2','dot3'].map(id => document.getElementById(id));
const progressBar = document.getElementById('progressBar');

let currentPhase = 0;
const phaseDuration = 15000;
const totalDuration = phaseDuration * 4;
let startTime = Date.now();

function updateProgress() {
  const elapsed = Date.now() - startTime;
  const progress = Math.min((elapsed / totalDuration) * 100, 100);
  progressBar.style.width = progress + '%';

  const newPhase = Math.min(Math.floor(elapsed / phaseDuration), 3);
  if (newPhase !== currentPhase) {
    phases[currentPhase].classList.remove('active');
    dots[currentPhase].classList.remove('active');
    phases[newPhase].classList.add('active');
    dots[newPhase].classList.add('active');
    currentPhase = newPhase;
  }

  if (elapsed < totalDuration) {
    requestAnimationFrame(updateProgress);
  } else {
    setTimeout(() => { window.location.href = 'game.html' + window.location.search; }, 400);
  }
}
requestAnimationFrame(updateProgress);

window.skipToNextPhase = function() {
  if (currentPhase >= 3) {
    window.location.href = 'game.html' + window.location.search;
    return;
  }
  phases[currentPhase].classList.remove('active');
  dots[currentPhase].classList.remove('active');
  currentPhase++;
  phases[currentPhase].classList.add('active');
  dots[currentPhase].classList.add('active');
  startTime = Date.now() - (currentPhase * phaseDuration);
};
</script>

</body>
</html>
