<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI-Sim - Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #FAFBFD;
    color: #1E293B;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 1100;
    width: 240px; background: #fff;
    border-right: 1px solid rgba(15,23,42,0.06);
    display: flex; flex-direction: column;
    padding: 24px 16px; gap: 2px;
  }
  .sb-brand { font-size: 17px; font-weight: 700; color: #0F172A; letter-spacing: -0.3px; padding: 0 12px 20px; }
  .sb-brand span { color: #2563EB; }
  .sb-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 500; color: #64748B;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
  }
  .sb-item:hover { background: #f1f5f9; color: #0F172A; }
  .sb-item.active { background: rgba(37,99,235,0.06); color: #2563EB; font-weight: 600; }
  .sb-item svg { flex-shrink: 0; }
  .sb-divider { height: 1px; background: rgba(15,23,42,0.06); margin: 10px 12px; }
  .sb-section-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; padding: 12px 12px 6px; }

  /* ── Loading screen ── */
  .loading-screen {
    position: fixed; top: 0; left: 240px; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #FAFBFD;
  }

  /* ── Content container ── */
  .loading-content {
    position: relative;
    text-align: center;
    max-width: 560px;
    padding: 24px;
  }

  /* ── Phase transition ── */
  .loading-phase {
    display: none; flex-direction: column; align-items: center; gap: 32px;
    animation: phaseIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .loading-phase.active { display: flex; }
  @keyframes phaseIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .loading-phase h2 {
    font-size: 32px; font-weight: 700; color: #0F172A;
    letter-spacing: -0.5px; line-height: 1.3;
  }
  .loading-phase p {
    font-size: 17px; color: #64748B; line-height: 1.6;
    font-weight: 400;
  }

  /* ── Scene preview card ── */
  .scene-preview {
    width: 420px; height: 240px;
    border-radius: 24px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    position: relative; overflow: hidden;
    box-shadow: 0 12px 40px rgba(15,23,42,0.06);
  }
  .scene-preview .preview-label {
    font-size: 12px; color: #94A3B8; font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ── Scene illustration ── */
  .scene-illust {
    position: relative; width: 200px; height: 90px;
  }
  .illust-desk {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 170px; height: 6px; background: #E2E8F0;
    border-radius: 3px;
  }
  .illust-obj {
    position: absolute; bottom: 6px; border-radius: 4px;
  }
  .illust-obj-1 { left: 28px; width: 18px; height: 22px; background: #93C5FD; border-radius: 4px; }
  .illust-obj-2 { left: 73px; width: 26px; height: 16px; background: #FCD34D; border-radius: 4px; }
  .illust-obj-3 { left: 122px; width: 12px; height: 24px; background: #86EFAC; border-radius: 4px; }
  .illust-arm {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 3px; height: 42px;
    background: linear-gradient(to bottom, #CBD5E1, #E2E8F0);
    border-radius: 2px;
    animation: armFloat 3.5s ease-in-out infinite;
  }
  .illust-arm::after {
    content: ''; position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 8px;
    background: #CBD5E1;
    border-radius: 2px 2px 5px 5px;
  }
  @keyframes armFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(5px); }
  }

  /* ── Control hints ── */
  .control-hints {
    display: flex; gap: 20px; justify-content: center;
  }
  .hint-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: #475569; font-weight: 500;
  }
  .hint-key {
    padding: 7px 14px; border-radius: 10px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 0 rgba(15,23,42,0.04);
    font-size: 12px; font-weight: 700; color: #334155;
    font-family: 'Inter', -apple-system, sans-serif;
    letter-spacing: 0.02em;
  }

  /* ── Hook section (Phase 3) ── */
  .hook-stat {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 16px;
    background: #FFF7ED;
    border: 1px solid #FED7AA;
  }
  .hook-stat-icon {
    width: 20px; height: 20px; color: #F59E0B;
  }
  .hook-stat-text {
    font-size: 15px; font-weight: 600; color: #92400E;
  }

  /* ── Briefing tags ── */
  .briefing-tags {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 20px 0 16px;
  }
  .briefing-tag {
    padding: 6px 14px; border-radius: 10px;
    background: #fff; border: 1px solid #E2E8F0;
    font-size: 13px; font-weight: 500; color: #475569;
  }
  .briefing-tag.hl {
    background: #EFF6FF; border-color: #BFDBFE; color: #2563EB;
  }

  /* ── Phase dots ── */
  .phase-dots {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 12px;
  }
  .phase-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #D1D5DB;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .phase-dot.active {
    background: #2563EB;
    width: 24px; border-radius: 3px;
  }

  /* ── Progress bar ── */
  .loading-progress {
    width: 200px; height: 3px;
    background: #E2E8F0;
    border-radius: 2px; overflow: hidden;
    margin: 24px auto 0;
  }
  .loading-progress-bar {
    height: 100%; width: 0%;
    background: #2563EB;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── Skip button ── */
  .skip-btn {
    position: absolute; bottom: 32px; right: 36px; z-index: 10;
    padding: 10px 20px; border-radius: 12px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    box-shadow: 0 1px 3px rgba(15,23,42,0.04);
    font-size: 13px; font-weight: 600;
    color: #64748B; text-decoration: none;
    transition: all 0.2s;
    font-family: 'Inter', -apple-system, sans-serif;
  }
  .skip-btn:hover {
    background: #F8FAFC;
    border-color: #CBD5E1;
    color: #334155;
    box-shadow: 0 2px 8px rgba(15,23,42,0.08);
  }
  .skip-note { font-size: 11px; color: #94A3B8; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .control-hints { flex-direction: column; gap: 12px; align-items: center; }
    .scene-preview { width: 320px; height: 190px; }
    .loading-phase h2 { font-size: 26px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sb-brand">Joy<span>AI</span>-Sim</div>
  <a class="sb-item" href="landing.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>
  <div class="sb-section-label">AI Models</div>
  <a class="sb-item" href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>视觉理解</a>
  <a class="sb-item" href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>视觉生成</a>
  <a class="sb-item active" href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>具身交互</a>
  <div class="sb-section-label">Tools</div>
  <a class="sb-item" href="leaderboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>排行榜</a>
  <a class="sb-item" href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>数据看板</a>
</div>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <!-- Phase 1: Level Briefing (from URL params) -->
    <div class="loading-phase active" id="phase1">
      <h2 id="briefingTitle">书桌 · 初级</h2>
      <div class="briefing-tags" id="briefingTags"></div>
      <p id="briefingDesc" style="max-width:400px;"></p>
    </div>

    <!-- Phase 2: Scene Preview -->
    <div class="loading-phase" id="phase2">
      <div class="scene-preview" style="overflow:hidden; position:relative;">
        <img src="assets/仿真抓取.gif" style="position:absolute; top:0; left:-100%; width:200%; height:100%; object-fit:cover;" />
      </div>
      <h2>即将进入<br>书桌整理挑战</h2>
      <p>桌面上 3 个物体等你归位</p>
    </div>

    <!-- Phase 3: Controls -->
    <div class="loading-phase" id="phase3">
      <h2>操控方式</h2>
      <div class="control-hints">
        <div class="hint-item"><span class="hint-key">Mouse</span> 移动</div>
        <div class="hint-item"><span class="hint-key">Click</span> 抓取</div>
        <div class="hint-item"><span class="hint-key">Space</span> 释放</div>
      </div>
      <p>像抓娃娃一样简单</p>
    </div>

    <!-- Phase 4: Hook -->
    <div class="loading-phase" id="phase4">
      <h2>你能比机器人<br>做得更好吗？</h2>
      <div class="hook-stat">
        <svg class="hook-stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="hook-stat-text">机器人完成同样任务用了 45 秒</span>
      </div>
    </div>

    <div class="phase-dots">
      <div class="phase-dot active" id="dot0"></div>
      <div class="phase-dot" id="dot1"></div>
      <div class="phase-dot" id="dot2"></div>
      <div class="phase-dot" id="dot3"></div>
    </div>

    <div class="loading-progress">
      <div class="loading-progress-bar" id="progressBar"></div>
    </div>

    <!-- Demo: skip to next phase -->
    <button onclick="skipToNextPhase()" style="margin-top:20px; padding:8px 18px; border-radius:10px; background:#f1f5f9; border:1px solid #E2E8F0; font-size:13px; font-weight:500; color:#64748B; cursor:pointer; font-family:inherit;">下一个 (Demo) &rarr;</button>
  </div>

  <a onclick="window.location.href='game.html'+window.location.search" class="skip-btn" style="cursor:pointer;">跳过加载 <span class="skip-note">(仅限 Demo)</span></a>
</div>

<script>
  // Parse URL params for briefing
  const urlParams = new URLSearchParams(window.location.search);
  const levelName = decodeURIComponent(urlParams.get('name') || '书桌·初级');
  const objects = parseInt(urlParams.get('objects')) || 5;
  const time = parseInt(urlParams.get('time')) || 720;
  const shuffle = urlParams.get('shuffle') === '1';
  const obstacles = urlParams.get('obstacles') === '1';
  const isT = urlParams.get('level') === 'tutorial';

  // Populate briefing phase
  document.getElementById('briefingTitle').textContent = levelName;

  const tags = [];
  if (isT) {
    tags.push('<span class="briefing-tag hl">教学模式</span>');
    tags.push('<span class="briefing-tag">不限时</span>');
    tags.push('<span class="briefing-tag">' + objects + ' 个物体</span>');
  } else {
    tags.push('<span class="briefing-tag">' + Math.floor(time/60) + ' 分钟</span>');
    tags.push('<span class="briefing-tag">' + objects + ' 个物体</span>');
    if (shuffle) tags.push('<span class="briefing-tag hl">分值随机</span>');
    if (obstacles) tags.push('<span class="briefing-tag hl">障碍物·位置随机</span>');
    tags.push('<span class="briefing-tag">位置随机</span>');
  }
  document.getElementById('briefingTags').innerHTML = tags.join('');

  let desc = isT
    ? '跟随引导学习机械臂操控。前 2 个物体有教学提示，之后凭手感操作。'
    : ['物体位置每局随机', shuffle ? '物体分值每局变化' : '', obstacles ? '每局含障碍物，位置随机，需规划路径' : ''].filter(Boolean).join('。') + '。';
  document.getElementById('briefingDesc').textContent = desc;

  // 4 phases × 15s = 60s
  const phases = [
    document.getElementById('phase1'),
    document.getElementById('phase2'),
    document.getElementById('phase3'),
    document.getElementById('phase4')
  ];
  const dots = [
    document.getElementById('dot0'),
    document.getElementById('dot1'),
    document.getElementById('dot2'),
    document.getElementById('dot3')
  ];
  const progressBar = document.getElementById('progressBar');

  let currentPhase = 0;
  const phaseDuration = 15000;
  const totalDuration = phaseDuration * 4;
  let startTime = Date.now();

  function updateProgress() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min((elapsed / totalDuration) * 100, 100);
    progressBar.style.width = progress + '%';

    const newPhase = Math.min(Math.floor(elapsed / phaseDuration), 3);
    if (newPhase !== currentPhase) {
      phases[currentPhase].classList.remove('active');
      dots[currentPhase].classList.remove('active');
      phases[newPhase].classList.add('active');
      dots[newPhase].classList.add('active');
      currentPhase = newPhase;
    }

    if (elapsed < totalDuration) {
      requestAnimationFrame(updateProgress);
    } else {
      setTimeout(() => { window.location.href = 'game.html' + window.location.search; }, 400);
    }
  }
  requestAnimationFrame(updateProgress);

  // Demo: skip to next phase manually
  window.skipToNextPhase = function() {
    if (currentPhase >= 3) {
      window.location.href = 'game.html' + window.location.search;
      return;
    }
    phases[currentPhase].classList.remove('active');
    dots[currentPhase].classList.remove('active');
    currentPhase++;
    phases[currentPhase].classList.add('active');
    dots[currentPhase].classList.add('active');
    // Jump time forward
    startTime = Date.now() - (currentPhase * phaseDuration);
  };
</script>

</body>
</html>
